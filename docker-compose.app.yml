version: '3.8'

services:
  logistics-agent:
    build: .
    container_name: logistics-agent
    ports:
      - "8000:8000"
    environment:
      - YANDEX_MAPS_API_KEY=${YANDEX_MAPS_API_KEY:-your_api_key_here}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=llama3.2:3b
      - CHROMA_DB_PATH=./chroma_db
      - RESOLUTIONS_PATH=./resolutions
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./resolutions:/app/resolutions
      - ./chroma_db:/app/chroma_db
      - ./app/static:/app/app/static
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        echo 'Запуск индексации документов...' &&
        python -m indexing.indexer &&
        echo 'Запуск сервера...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
